<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>EWZ/SPY Dashboard</title>
  <style>
    :root {
      --bg: #080b0c;
      --panel: #101518;
      --line: #223038;
      --text: #e6ece9;
      --muted: #91a097;
      --accent: #d8c37a;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--text);
      background:
        radial-gradient(1200px 600px at 0% 0%, #1c292f 0%, transparent 55%),
        radial-gradient(1000px 500px at 100% 100%, #2d1f1d 0%, transparent 60%),
        var(--bg);
      font-family: "Space Grotesk", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .wrap {
      max-width: 1320px;
      margin: 0 auto;
      padding: 18px 16px;
      display: grid;
      gap: 12px;
    }
    .bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
      border: 1px solid var(--line);
      background: linear-gradient(170deg, rgba(16,21,24,.95), rgba(8,11,12,.95));
      border-radius: 10px;
      padding: 12px;
    }
    .title {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: .2px;
    }
    .date {
      color: var(--muted);
      font-size: 12px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    }
    .controls {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    label {
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
    }
    select {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      border-radius: 8px;
      padding: 8px 10px;
      font-weight: 600;
      min-width: 100px;
      outline: none;
    }
    iframe {
      width: 100%;
      height: calc(100vh - 110px);
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #050708;
    }
    @media (max-width: 860px) {
      iframe { height: calc(100vh - 140px); }
      .title { font-size: 16px; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="bar">
      <div>
        <div class="title">Options Flow Dashboard</div>
        <div class="date">Última atualização: 2026-04-27</div>
      </div>
      <div class="controls">
        <label for="symbol">Símbolo</label>
        <select id="symbol">
          <option value="EWZ">EWZ</option>
<option value="SPY">SPY</option>
        </select>
      </div>
    </section>
    <iframe id="frame" title="Dashboard"></iframe>
  </main>
  <script>
    const dashboards = {"EWZ": "latest/EWZ.html", "SPY": "latest/SPY.html"};
    const selector = document.getElementById("symbol");
    const frame = document.getElementById("frame");
    const defaultSymbol = "EWZ";

    function pickInitialSymbol() {
      const hashSymbol = location.hash.replace("#", "").toUpperCase();
      if (dashboards[hashSymbol]) return hashSymbol;
      return dashboards[defaultSymbol] ? defaultSymbol : Object.keys(dashboards)[0];
    }

    function render(symbol) {
      if (!dashboards[symbol]) return;
      selector.value = symbol;
      frame.src = dashboards[symbol];
      if (location.hash !== "#" + symbol) {
        history.replaceState(null, "", "#" + symbol);
      }
    }

    selector.addEventListener("change", () => render(selector.value));
    window.addEventListener("hashchange", () => render(pickInitialSymbol()));
    render(pickInitialSymbol());
  </script>
</body>
</html>
